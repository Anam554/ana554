<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Sugar Calculator Pro</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
.container{max-width:900px;margin:auto;background:white;padding:20px;border-radius:10px}
input{width:100%;padding:8px;margin:4px 0 10px}
button{padding:10px 15px;cursor:pointer}
.result{margin-top:15px;padding:15px;background:#eef;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h2>Spain Bangladesh Agro Industries Ltd.</h2>
<h3>Pineapple Canning QC Calculator</h3>

<label>Date & Time</label>
<input type="datetime-local" id="dt">

<label>Inspector Name</label>
<input id="inspector" value="Md. Anamul Hasan">

<label>Batch No</label>
<input id="batch">

<label>Raw Material Brix (%)</label>
<input type="number" id="rawBrix" value="6.8" step="0.01">

<label>Juice Brix (%)</label>
<input type="number" id="juiceBrix" value="4.9" step="0.01">

<label>Target Final Brix (%)</label>
<input type="number" id="targetBrix" value="11" step="0.01">

<label>Slice Weight (g)</label>
<input type="number" id="sliceWeight" value="150">

<label>Net Weight (g)</label>
<input type="number" id="netWeight" value="230">

<label>Can Liquid Weight (g)</label>
<input type="number" id="liquidWeight" value="80">

<label>Batch Size (kg)</label>
<input type="number" id="batchSize" value="800">

<button onclick="calculate()">Calculate</button>
<button onclick="window.print()">Print</button>

<div class="result" id="result">Enter values and click Calculate.</div>
</div>

<script>
function calculate(){
const rawBrix=parseFloat(document.getElementById('rawBrix').value)||0;
const juiceBrix=parseFloat(document.getElementById('juiceBrix').value)||0;
const targetBrix=parseFloat(document.getElementById('targetBrix').value)||0;
const sliceWeight=parseFloat(document.getElementById('sliceWeight').value)||0;
const netWeight=parseFloat(document.getElementById('netWeight').value)||0;
const liquidWeight=parseFloat(document.getElementById('liquidWeight').value)||0;
const batchSize=parseFloat(document.getElementById('batchSize').value)||0;

const fruitSolids=sliceWeight*rawBrix/100;
const targetSolids=netWeight*targetBrix/100;
const syrupSolids=targetSolids-fruitSolids;
const requiredSyrupBrix=(syrupSolids/liquidWeight)*100;
const additionalSugarPercent=requiredSyrupBrix-juiceBrix;
const sugarRequired=batchSize*additionalSugarPercent/100;

document.getElementById('result').innerHTML=`
<b>Fruit Solids:</b> ${fruitSolids.toFixed(2)} g<br>
<b>Target Solids:</b> ${targetSolids.toFixed(2)} g<br>
<b>Syrup Solids Required:</b> ${syrupSolids.toFixed(2)} g<br>
<b>Required Syrup Brix:</b> ${requiredSyrupBrix.toFixed(2)} °Bx<br>
<b>Additional Sugar:</b> ${additionalSugarPercent.toFixed(2)} %<br>
<b>Total Sugar Required:</b> ${sugarRequired.toFixed(2)} kg
`;
}
</script>
</body>
</html>
